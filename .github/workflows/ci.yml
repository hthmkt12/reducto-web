name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  build-and-smoke:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Run Local Cloudflare Pages Smoke and E2E Tests
        run: |
          npx --yes wrangler pages dev out --port 48329 --ip 127.0.0.1 &
          SERVER_PID=$!
          trap "kill $SERVER_PID || true" EXIT
          for i in {1..30}; do
            if curl -fsS http://127.0.0.1:48329 >/dev/null; then
              break
            fi
            sleep 1
          done
          SMOKE_BASE_URL=http://127.0.0.1:48329 npm run test:smoke
          SMOKE_BASE_URL=http://127.0.0.1:48329 npm run test:e2e

      - name: Deploy Production to Cloudflare Pages
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          if [ -z "$CLOUDFLARE_API_TOKEN" ] || [ -z "$CLOUDFLARE_ACCOUNT_ID" ]; then
            echo "Cloudflare deploy skipped: missing CLOUDFLARE_API_TOKEN or CLOUDFLARE_ACCOUNT_ID."
            exit 0
          fi
          npx --yes wrangler pages deploy out --project-name reducto --branch main
