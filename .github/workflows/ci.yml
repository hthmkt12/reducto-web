name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  build-and-smoke:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Wait for Vercel Deployment
        uses: amannn/action-vercel-deployment-status@v2
        id: vercel_deployment
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          vercel-project-id: prj_38LY4iG7RZbLlh2DFhrLu8J6dWoD

      - name: Run Smoke Tests
        env:
          SMOKE_BASE_URL: ${{ steps.vercel_deployment.outputs.url }}
        run: npm run test:smoke

      - name: Run E2E Tests
        env:
          SMOKE_BASE_URL: ${{ steps.vercel_deployment.outputs.url }}
        run: npm run test:e2e
