name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  build-and-smoke:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Pull Vercel Project Info
        id: vercel-pull
        continue-on-error: true
        run: npx vercel pull --yes --environment=preview --token=${{ secrets.VERCEL_TOKEN }}

      - name: Build Project Artifacts
        if: steps.vercel-pull.outcome == 'success'
        run: npx vercel build --token=${{ secrets.VERCEL_TOKEN }}

      - name: Deploy Project Artifacts to Vercel
        if: steps.vercel-pull.outcome == 'success'
        id: deploy
        run: |
          DEPLOY_URL=$(npx vercel deploy --prebuilt --token=${{ secrets.VERCEL_TOKEN }})
          echo "url=$DEPLOY_URL" >> $GITHUB_OUTPUT

      - name: Run Smoke Tests Against Vercel Preview
        if: steps.vercel-pull.outcome == 'success'
        env:
          SMOKE_BASE_URL: ${{ steps.deploy.outputs.url }}
        run: npm run test:smoke

      - name: Run E2E Tests Against Vercel Preview
        if: steps.vercel-pull.outcome == 'success'
        env:
          SMOKE_BASE_URL: ${{ steps.deploy.outputs.url }}
        run: npm run test:e2e

      - name: Run Local Smoke Tests
        if: steps.vercel-pull.outcome != 'success'
        run: |
          npx next start -p 48329 &
          SERVER_PID=$!
          trap "kill $SERVER_PID" EXIT
          for i in {1..30}; do
            if curl -fsS http://127.0.0.1:48329 >/dev/null; then
              break
            fi
            sleep 1
          done
          SMOKE_BASE_URL=http://127.0.0.1:48329 npm run test:smoke

      - name: Run Local E2E Tests
        if: steps.vercel-pull.outcome != 'success'
        run: npm run test:e2e
